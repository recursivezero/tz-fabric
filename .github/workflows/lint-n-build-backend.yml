name: Lint and Build Backend 
run-name: Python Lint and Build - ${{ github.ref_name }}

on:
  push:
    branches: ["main", "develop", "feature/*", "!task/*"]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: ["main", "develop", "release"]
    types: [opened, synchronize, ready_for_review]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: backend

jobs:
  check_run:
      runs-on: ubuntu-latest
      outputs:
        should_run: ${{ steps.validate.outputs.should_run }}
      steps:
        - id: validate
          run: |
            if [[ "${{ github.event_name }}" == "pull_request" || "${{ github.ref }}" == "refs/heads/main" ]]; then
              echo "should_run=true" >> $GITHUB_OUTPUT
            else
              echo "should_run=false" >> $GITHUB_OUTPUT
            fi
  lint:
    needs: check_run
    if: needs.check_run.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Poetry
        run: pipx install poetry

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "poetry"
          # Path relative to the repository root
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: poetry install --with dev

      - name: Run lint
        run: poetry run lint

  build:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Poetry
        run: pipx install poetry

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "poetry"
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: poetry install

      - name: Run build
        run: poetry build