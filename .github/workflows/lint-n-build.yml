name: Lint and Build Frontend
run-name: Lint and Build when push or raise PR

on:
  push:
    branches: ["main", "develop", "feature/*", "!task/*"]
    paths: &filters # reference syntax
      - "frontend/**"

  pull_request:
    branches: ["main", "develop", "release"]
    types: [opened, synchronize, ready_for_review]
    paths: *filters

concurrency:
  group: build-${{ github.ref }} # group by branch
  cancel-in-progress: true # cancel older runs

defaults: 
  run: 
    working-directory: frontend

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  build:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run build
        run: npm run build
